<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Drag and Drop Teste</title>
    <style>
        .container {
            width: 200px;
            height: 200px;
            border: 5px solid black;
            margin: 20px;
            display: inline-block;
            vertical-align: top;
        }
        #quadrado {
            width: 100px;
            height: 100px;
            background-color: red;
            cursor: move;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="quadrado" draggable="true"></div>
    </div>

    <div class="container"></div>

    <script src="script.js"></script>
</body>
</html>
